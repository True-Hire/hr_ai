name: Build and Deploy HR AI Backend

on:
  push:
    branches:
      - trunk

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker image
        run: |
          docker build --no-cache \
            -t ghcr.io/ruziba3vich/hr-ai:latest .

      - name: Push Docker image
        run: |
          docker push ghcr.io/ruziba3vich/hr-ai:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script_stop: true
          envs: DATABASE_URL,SERVER_PORT,GEMINI_API_KEY,JWT_SECRET,QDRANT_URL,QDRANT_API_KEY,REDIS_URL,TELEGRAM_BOT_TOKEN,TELEGRAM_HR_BOT_TOKEN,MINIO_ENDPOINT,MINIO_ACCESS_KEY,MINIO_SECRET_KEY,MINIO_BUCKET,MINIO_USE_SSL,MINIO_PUBLIC_URL,WEBAPP_URL,HR_WEBAPP_URL,GHCR_TOKEN,ANTHROPIC_API_KEY
          script: |
            echo "Logging in to GHCR..."
            echo "$GHCR_TOKEN" | docker login ghcr.io -u ruziba3vich --password-stdin

            echo "Writing .env file..."
            mkdir -p /opt/hr-ai
            cat > /opt/hr-ai/.env << EOF
            DATABASE_URL=$DATABASE_URL
            SERVER_PORT=$SERVER_PORT
            GEMINI_API_KEY=$GEMINI_API_KEY
            JWT_SECRET=$JWT_SECRET
            QDRANT_URL=$QDRANT_URL
            QDRANT_API_KEY=$QDRANT_API_KEY
            REDIS_URL=$REDIS_URL
            TELEGRAM_BOT_TOKEN=$TELEGRAM_BOT_TOKEN
            TELEGRAM_HR_BOT_TOKEN=$TELEGRAM_HR_BOT_TOKEN
            MINIO_ENDPOINT=$MINIO_ENDPOINT
            MINIO_ACCESS_KEY=$MINIO_ACCESS_KEY
            MINIO_SECRET_KEY=$MINIO_SECRET_KEY
            MINIO_BUCKET=$MINIO_BUCKET
            MINIO_USE_SSL=$MINIO_USE_SSL
            MINIO_PUBLIC_URL=$MINIO_PUBLIC_URL
            WEBAPP_URL=$WEBAPP_URL
            HR_WEBAPP_URL=$HR_WEBAPP_URL
            ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY
            EOF
            chmod 600 /opt/hr-ai/.env

            echo "Stopping old container (if exists)..."
            docker stop hr-ai || true
            docker rm hr-ai || true

            echo "Removing old image..."
            docker rmi ghcr.io/ruziba3vich/hr-ai:latest || true

            echo "Pulling latest image..."
            docker pull ghcr.io/ruziba3vich/hr-ai:latest

            echo "Starting new container..."
            docker run -d \
              --restart always \
              --name hr-ai \
              --network host \
              --env-file /opt/hr-ai/.env \
              ghcr.io/ruziba3vich/hr-ai:latest

            echo "Deployment successful!"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_HR_BOT_TOKEN: ${{ secrets.TELEGRAM_HR_BOT_TOKEN }}
          MINIO_ENDPOINT: ${{ secrets.MINIO_ENDPOINT }}
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
          MINIO_BUCKET: ${{ secrets.MINIO_BUCKET }}
          MINIO_USE_SSL: ${{ secrets.MINIO_USE_SSL }}
          MINIO_PUBLIC_URL: ${{ secrets.MINIO_PUBLIC_URL }}
          WEBAPP_URL: ${{ secrets.WEBAPP_URL }}
          HR_WEBAPP_URL: ${{ secrets.HR_WEBAPP_URL }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
