<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mini App</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #fff;
  color: #1a1a1a;
  min-height: 100vh;
}
.search-bar {
  position: sticky;
  top: 0;
  z-index: 10;
  background: #fff;
  padding: 16px 16px 12px;
  border-bottom: 1px solid #e5e5e5;
}
.search-bar h1 {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 10px;
  padding-top: 8px;
}
.search-bar input {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid #ddd;
  border-radius: 10px;
  font-size: 15px;
  outline: none;
  background: #f5f5f5;
}
.search-bar input:focus {
  border-color: #007aff;
  background: #fff;
}
.vacancy-list {
  padding: 8px 16px 80px;
}
.vacancy-card {
  background: #fff;
  border: 1px solid #e5e5e5;
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: box-shadow 0.15s;
}
.vacancy-card:active {
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
.vacancy-card .title {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 4px;
}
.vacancy-card .company {
  font-size: 13px;
  color: #666;
  margin-bottom: 6px;
}
.vacancy-card .meta {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 6px;
}
.vacancy-card .meta span {
  font-size: 12px;
  color: #555;
  background: #f0f0f0;
  padding: 2px 8px;
  border-radius: 6px;
}
.vacancy-card .skills {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}
.vacancy-card .skills span {
  font-size: 11px;
  color: #007aff;
  background: #e8f0fe;
  padding: 2px 8px;
  border-radius: 10px;
}

/* Detail view */
.detail-view {
  display: none;
  padding: 16px;
  padding-bottom: 80px;
}
.detail-view.active {
  display: block;
}
.detail-view .detail-title {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 8px;
}
.detail-view .detail-company {
  font-size: 15px;
  color: #666;
  margin-bottom: 12px;
}
.detail-view .detail-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 16px;
}
.detail-view .detail-meta span {
  font-size: 13px;
  background: #f0f0f0;
  padding: 4px 10px;
  border-radius: 8px;
}
.detail-view .detail-section {
  margin-bottom: 16px;
}
.detail-view .detail-section h3 {
  font-size: 14px;
  font-weight: 600;
  color: #333;
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}
.detail-view .detail-section p {
  font-size: 14px;
  color: #444;
  line-height: 1.5;
  white-space: pre-wrap;
}
.detail-view .detail-skills {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 16px;
}
.detail-view .detail-skills span {
  font-size: 13px;
  color: #007aff;
  background: #e8f0fe;
  padding: 4px 12px;
  border-radius: 12px;
}
.detail-view .contact-info {
  background: #f8f8f8;
  border-radius: 12px;
  padding: 12px;
}
.detail-view .contact-info div {
  font-size: 13px;
  color: #555;
  margin-bottom: 4px;
}
.apply-btn {
  display: block;
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 20px;
  transition: opacity 0.15s;
}
.apply-btn.apply {
  background: #007aff;
  color: #fff;
}
.apply-btn.apply:active {
  opacity: 0.8;
}
.apply-btn.applied {
  background: #e8f0fe;
  color: #007aff;
  cursor: default;
}
.apply-btn:disabled {
  opacity: 0.6;
  cursor: default;
}

/* Profile view */
.profile-view {
  display: none;
  padding: 16px;
  padding-bottom: 80px;
}
.profile-view.active {
  display: block;
}
.profile-header {
  text-align: center;
  margin-bottom: 20px;
  padding-top: 8px;
}
.profile-avatar {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  object-fit: cover;
  margin-bottom: 12px;
  border: 2px solid #e5e5e5;
}
.profile-avatar-placeholder {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: #e8f0fe;
  color: #007aff;
  font-size: 32px;
  font-weight: 600;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 12px;
}
.profile-name {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 4px;
}
.profile-title {
  font-size: 15px;
  color: #666;
}
.profile-section {
  margin-bottom: 20px;
}
.profile-section h3 {
  font-size: 14px;
  font-weight: 600;
  color: #333;
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}
.profile-section p {
  font-size: 14px;
  color: #444;
  line-height: 1.5;
  white-space: pre-wrap;
}
.profile-skills {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.profile-skills span {
  font-size: 13px;
  color: #007aff;
  background: #e8f0fe;
  padding: 4px 12px;
  border-radius: 12px;
}
.profile-card {
  background: #fff;
  border: 1px solid #e5e5e5;
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 10px;
}
.profile-card .card-title {
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 2px;
}
.profile-card .card-subtitle {
  font-size: 13px;
  color: #666;
  margin-bottom: 4px;
}
.profile-card .card-date {
  font-size: 12px;
  color: #999;
  margin-bottom: 6px;
}
.profile-card .card-desc {
  font-size: 13px;
  color: #444;
  line-height: 1.4;
  white-space: pre-wrap;
}
.profile-card .card-projects {
  margin-top: 8px;
}
.profile-card .project-name {
  font-size: 13px;
  font-weight: 600;
  color: #333;
  margin-bottom: 2px;
}
.profile-card .project-items {
  font-size: 12px;
  color: #555;
  padding-left: 14px;
  margin-bottom: 6px;
}
.profile-card .project-items li {
  margin-bottom: 2px;
}
.profile-langs {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.profile-langs .lang-item {
  background: #f0f0f0;
  padding: 6px 12px;
  border-radius: 8px;
  font-size: 13px;
}
.profile-langs .lang-item .lang-level {
  color: #666;
  font-size: 11px;
}
.profile-contact {
  background: #f8f8f8;
  border-radius: 12px;
  padding: 12px;
}
.profile-contact div {
  font-size: 13px;
  color: #555;
  margin-bottom: 4px;
}
.profile-certs {
  list-style: none;
}
.profile-certs li {
  font-size: 13px;
  color: #444;
  padding: 4px 0;
  border-bottom: 1px solid #f0f0f0;
}
.profile-certs li:last-child {
  border-bottom: none;
}

.loading {
  text-align: center;
  padding: 40px;
  color: #999;
  font-size: 14px;
}
.empty {
  text-align: center;
  padding: 60px 20px;
  color: #999;
  font-size: 15px;
}
</style>
</head>
<body>

<div id="listView">
  <div class="search-bar">
    <h1 id="searchTitle">Vacancies</h1>
    <input type="text" id="searchInput" placeholder="Search vacancies...">
  </div>
  <div class="vacancy-list" id="vacancyList">
    <div class="loading" id="loadingIndicator">Loading...</div>
  </div>
</div>

<div class="detail-view" id="detailView"></div>

<div class="profile-view" id="profileView"></div>

<script>
const tg = window.Telegram && window.Telegram.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
  if (tg.requestFullscreen) {
    tg.requestFullscreen();
  }
  if (tg.disableVerticalSwipes) {
    tg.disableVerticalSwipes();
  }
}

const API_BASE = window.location.origin + '/api/v1/miniapp';
const initData = (tg && tg.initData) || '';
const userLang = (tg && tg.initDataUnsafe && tg.initDataUnsafe.user && tg.initDataUnsafe.user.language_code) || 'en';

// Map language to our supported languages
function getLang() {
  if (userLang === 'ru') return 'ru';
  if (userLang === 'uz') return 'uz';
  return 'en';
}

const lang = getLang();
let currentView = 'list';
let debounceTimer = null;

// Determine which view to show based on URL param
const urlParams = new URLSearchParams(window.location.search);
const viewParam = urlParams.get('view');

// Localize UI
const labels = {
  en: {
    title: 'Vacancies', search: 'Search vacancies...',
    profileTitle: 'My Profile',
    about: 'About', skills: 'Skills', experience: 'Experience',
    education: 'Education', languages: 'Languages',
    certifications: 'Certifications', achievements: 'Achievements',
    contact: 'Contact', noProfile: 'No profile yet.\nSend your resume in the chat to get started!',
    loading: 'Loading...', apply: 'Apply', applied: 'Applied', applying: 'Applying...'
  },
  ru: {
    title: 'Вакансии', search: 'Поиск вакансий...',
    profileTitle: 'Мой профиль',
    about: 'О себе', skills: 'Навыки', experience: 'Опыт работы',
    education: 'Образование', languages: 'Языки',
    certifications: 'Сертификаты', achievements: 'Достижения',
    contact: 'Контакты', noProfile: 'Профиль пока пуст.\nОтправьте резюме в чат, чтобы начать!',
    loading: 'Загрузка...', apply: 'Откликнуться', applied: 'Отклик отправлен', applying: 'Отправка...'
  },
  uz: {
    title: 'Vakansiyalar', search: 'Vakansiyalarni qidirish...',
    profileTitle: 'Mening profilim',
    about: 'Men haqimda', skills: 'Ko\'nikmalar', experience: 'Ish tajribasi',
    education: 'Ta\'lim', languages: 'Tillar',
    certifications: 'Sertifikatlar', achievements: 'Yutuqlar',
    contact: 'Aloqa', noProfile: 'Profil hali bo\'sh.\nBoshlash uchun chatda rezyume yuboring!',
    loading: 'Yuklanmoqda...', apply: 'Ariza berish', applied: 'Ariza yuborildi', applying: 'Yuborilmoqda...'
  },
};
const l = labels[lang] || labels.en;

// Auth header
function authHeaders() {
  return { 'Authorization': 'tma ' + initData };
}

async function apiFetch(url) {
  const resp = await fetch(url, { headers: authHeaders() });
  if (!resp.ok) {
    const body = await resp.text().catch(() => '');
    throw new Error('API error: ' + resp.status + ' ' + body);
  }
  return resp.json();
}

function escapeHtml(text) {
  if (!text) return '';
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// ==================== VACANCY VIEW ====================

function initVacancyView() {
  document.getElementById('searchTitle').textContent = l.title;
  document.getElementById('searchInput').placeholder = l.search;

  document.getElementById('searchInput').addEventListener('input', function(e) {
    clearTimeout(debounceTimer);
    const query = e.target.value.trim();
    debounceTimer = setTimeout(() => {
      if (query.length === 0) {
        loadVacancies();
      } else {
        searchVacancies(query);
      }
    }, 500);
  });

  loadVacancies();
}

function renderCard(v) {
  const card = document.createElement('div');
  card.className = 'vacancy-card';
  card.onclick = () => showDetail(v.id);

  let html = '';
  const title = (v.text && v.text.title) || 'Untitled';
  const company = (v.company && v.company.name) || '';

  html += '<div class="title">' + escapeHtml(title) + '</div>';
  if (company) {
    html += '<div class="company">' + escapeHtml(company) + '</div>';
  }

  const meta = [];
  if (v.salary_min || v.salary_max) {
    let salary = '';
    if (v.salary_min && v.salary_max) salary = v.salary_min + '-' + v.salary_max;
    else if (v.salary_min) salary = 'from ' + v.salary_min;
    else salary = 'up to ' + v.salary_max;
    salary += ' ' + (v.salary_currency || 'USD');
    meta.push(salary);
  }
  if (v.format && v.format !== 'office') meta.push(v.format);
  if (v.schedule && v.schedule !== 'full-time') meta.push(v.schedule);
  if (v.experience_min || v.experience_max) {
    let exp = '';
    if (v.experience_min && v.experience_max) exp = v.experience_min + '-' + v.experience_max + ' yrs';
    else if (v.experience_min) exp = v.experience_min + '+ yrs';
    else exp = 'up to ' + v.experience_max + ' yrs';
    meta.push(exp);
  }

  if (meta.length) {
    html += '<div class="meta">' + meta.map(m => '<span>' + escapeHtml(m) + '</span>').join('') + '</div>';
  }

  if (v.skills && v.skills.length) {
    const skillTags = v.skills.slice(0, 5).map(s => '<span>' + escapeHtml(s.name) + '</span>').join('');
    html += '<div class="skills">' + skillTags + '</div>';
  }

  card.innerHTML = html;
  return card;
}

async function loadVacancies() {
  const list = document.getElementById('vacancyList');
  list.innerHTML = '<div class="loading">' + escapeHtml(l.loading) + '</div>';

  try {
    const data = await apiFetch(API_BASE + '/vacancies?lang=' + lang + '&page=1&page_size=50');
    list.innerHTML = '';

    if (!data.vacancies || data.vacancies.length === 0) {
      list.innerHTML = '<div class="empty">No vacancies found</div>';
      return;
    }

    data.vacancies.forEach(v => {
      list.appendChild(renderCard(v));
    });
  } catch (e) {
    list.innerHTML = '<div class="empty">' + escapeHtml(e.message) + '<br><br><small>initData length: ' + initData.length + '</small></div>';
    console.error(e);
  }
}

async function searchVacancies(query) {
  const list = document.getElementById('vacancyList');
  list.innerHTML = '<div class="loading">' + escapeHtml(l.loading) + '</div>';

  try {
    let url = API_BASE + '/vacancies/search?lang=' + lang + '&page=1&page_size=50';
    if (query) url += '&q=' + encodeURIComponent(query);

    const data = await apiFetch(url);
    list.innerHTML = '';

    if (!data.vacancies || data.vacancies.length === 0) {
      list.innerHTML = '<div class="empty">No vacancies found</div>';
      return;
    }

    data.vacancies.forEach(v => {
      list.appendChild(renderCard(v));
    });
  } catch (e) {
    list.innerHTML = '<div class="empty">Search failed</div>';
    console.error(e);
  }
}

async function showDetail(id) {
  currentView = 'detail';
  document.getElementById('listView').style.display = 'none';
  const detail = document.getElementById('detailView');
  detail.className = 'detail-view active';
  detail.innerHTML = '<div class="loading">' + escapeHtml(l.loading) + '</div>';

  tg.BackButton.show();

  try {
    const v = await apiFetch(API_BASE + '/vacancies/' + id + '?lang=' + lang);

    let html = '';
    const title = (v.text && v.text.title) || 'Untitled';
    const company = (v.company && v.company.name) || '';

    html += '<div class="detail-title">' + escapeHtml(title) + '</div>';
    if (company) {
      html += '<div class="detail-company">' + escapeHtml(company) + '</div>';
    }

    const meta = [];
    if (v.salary_min || v.salary_max) {
      let salary = '';
      if (v.salary_min && v.salary_max) salary = v.salary_min + '-' + v.salary_max;
      else if (v.salary_min) salary = 'from ' + v.salary_min;
      else salary = 'up to ' + v.salary_max;
      salary += ' ' + (v.salary_currency || 'USD');
      meta.push(salary);
    }
    if (v.format) meta.push(v.format);
    if (v.schedule) meta.push(v.schedule);
    if (v.experience_min || v.experience_max) {
      let exp = '';
      if (v.experience_min && v.experience_max) exp = v.experience_min + '-' + v.experience_max + ' years';
      else if (v.experience_min) exp = v.experience_min + '+ years';
      else exp = 'up to ' + v.experience_max + ' years';
      meta.push(exp);
    }
    if (meta.length) {
      html += '<div class="detail-meta">' + meta.map(m => '<span>' + escapeHtml(m) + '</span>').join('') + '</div>';
    }

    if (v.skills && v.skills.length) {
      html += '<div class="detail-skills">' + v.skills.map(s => '<span>' + escapeHtml(s.name) + '</span>').join('') + '</div>';
    }

    if (v.text) {
      if (v.text.description) {
        html += '<div class="detail-section"><h3>Description</h3><p>' + escapeHtml(v.text.description) + '</p></div>';
      }
      if (v.text.responsibilities) {
        html += '<div class="detail-section"><h3>Responsibilities</h3><p>' + escapeHtml(v.text.responsibilities) + '</p></div>';
      }
      if (v.text.requirements) {
        html += '<div class="detail-section"><h3>Requirements</h3><p>' + escapeHtml(v.text.requirements) + '</p></div>';
      }
      if (v.text.benefits) {
        html += '<div class="detail-section"><h3>Benefits</h3><p>' + escapeHtml(v.text.benefits) + '</p></div>';
      }
    }

    const contacts = [];
    if (v.phone) contacts.push('<div>Phone: ' + escapeHtml(v.phone) + '</div>');
    if (v.telegram) contacts.push('<div>Telegram: ' + escapeHtml(v.telegram) + '</div>');
    if (v.email) contacts.push('<div>Email: ' + escapeHtml(v.email) + '</div>');
    if (v.address) contacts.push('<div>Address: ' + escapeHtml(v.address) + '</div>');
    if (contacts.length) {
      html += '<div class="detail-section"><h3>Contact</h3><div class="contact-info">' + contacts.join('') + '</div></div>';
    }

    // Apply button
    html += '<button id="applyBtn" class="apply-btn apply" onclick="applyToVacancy(\'' + id + '\')">' + escapeHtml(l.apply) + '</button>';

    detail.innerHTML = html;

    // Check if already applied
    checkApplicationStatus(id);
  } catch (e) {
    detail.innerHTML = '<div class="empty">Failed to load vacancy</div>';
    console.error(e);
  }
}

// ==================== APPLY ====================

async function checkApplicationStatus(vacancyId) {
  try {
    await apiFetch(API_BASE + '/vacancies/' + vacancyId + '/application');
    // If we get here, user has already applied
    setAppliedState();
  } catch (e) {
    // 404 means not applied — leave button as "Apply"
  }
}

function setAppliedState() {
  const btn = document.getElementById('applyBtn');
  if (btn) {
    btn.className = 'apply-btn applied';
    btn.textContent = l.applied;
    btn.disabled = true;
    btn.onclick = null;
  }
}

async function applyToVacancy(vacancyId) {
  const btn = document.getElementById('applyBtn');
  if (!btn || btn.disabled) return;

  btn.disabled = true;
  btn.textContent = l.applying;

  try {
    await fetch(API_BASE + '/vacancies/' + vacancyId + '/apply', {
      method: 'POST',
      headers: { ...authHeaders(), 'Content-Type': 'application/json' },
      body: JSON.stringify({})
    }).then(resp => {
      if (!resp.ok && resp.status !== 409) throw new Error('Failed');
      return resp;
    });
    setAppliedState();
  } catch (e) {
    btn.disabled = false;
    btn.textContent = l.apply;
    btn.className = 'apply-btn apply';
    console.error(e);
  }
}

// ==================== PROFILE VIEW ====================

function initProfileView() {
  document.getElementById('listView').style.display = 'none';
  const profileDiv = document.getElementById('profileView');
  profileDiv.className = 'profile-view active';
  currentView = 'profile';
  loadProfile();
}

async function loadProfile() {
  const profileDiv = document.getElementById('profileView');
  profileDiv.innerHTML = '<div class="loading">' + escapeHtml(l.loading) + '</div>';

  try {
    const u = await apiFetch(API_BASE + '/me?lang=' + lang);
    renderProfile(u);
  } catch (e) {
    profileDiv.innerHTML = '<div class="empty">' + escapeHtml(e.message) + '</div>';
    console.error(e);
  }
}

function renderProfile(u) {
  const profileDiv = document.getElementById('profileView');
  let html = '';

  // Header with avatar and name
  html += '<div class="profile-header">';
  const name = [u.first_name, u.last_name].filter(Boolean).join(' ') || 'User';
  if (u.profile_pic_url) {
    html += '<img class="profile-avatar" src="' + escapeHtml(u.profile_pic_url) + '" alt="">';
  } else {
    const initials = (u.first_name ? u.first_name[0] : '') + (u.last_name ? u.last_name[0] : '');
    html += '<div class="profile-avatar-placeholder">' + escapeHtml(initials.toUpperCase()) + '</div>';
  }
  html += '<div class="profile-name">' + escapeHtml(name) + '</div>';
  if (u.profile && u.profile.title) {
    html += '<div class="profile-title">' + escapeHtml(u.profile.title) + '</div>';
  }
  html += '</div>';

  if (!u.profile) {
    html += '<div class="empty">' + escapeHtml(l.noProfile) + '</div>';
    profileDiv.innerHTML = html;
    return;
  }

  const p = u.profile;

  // About
  if (p.about) {
    html += '<div class="profile-section"><h3>' + escapeHtml(l.about) + '</h3>';
    html += '<p>' + escapeHtml(p.about) + '</p></div>';
  }

  // Skills
  if (p.skills && p.skills.length) {
    html += '<div class="profile-section"><h3>' + escapeHtml(l.skills) + '</h3>';
    html += '<div class="profile-skills">' + p.skills.map(s => '<span>' + escapeHtml(s) + '</span>').join('') + '</div></div>';
  }

  // Experience
  if (p.experience && p.experience.length) {
    html += '<div class="profile-section"><h3>' + escapeHtml(l.experience) + '</h3>';
    p.experience.forEach(exp => {
      html += '<div class="profile-card">';
      html += '<div class="card-title">' + escapeHtml(exp.position) + '</div>';
      html += '<div class="card-subtitle">' + escapeHtml(exp.company) + '</div>';
      const dates = [exp.start_date, exp.end_date].filter(Boolean).join(' — ');
      if (dates) html += '<div class="card-date">' + escapeHtml(dates) + '</div>';
      if (exp.description) html += '<div class="card-desc">' + escapeHtml(exp.description) + '</div>';
      if (exp.projects && exp.projects.length) {
        html += '<div class="card-projects">';
        exp.projects.forEach(proj => {
          html += '<div class="project-name">' + escapeHtml(proj.project) + '</div>';
          if (proj.items && proj.items.length) {
            html += '<ul class="project-items">' + proj.items.map(i => '<li>' + escapeHtml(i) + '</li>').join('') + '</ul>';
          }
        });
        html += '</div>';
      }
      html += '</div>';
    });
    html += '</div>';
  }

  // Education
  if (p.education && p.education.length) {
    html += '<div class="profile-section"><h3>' + escapeHtml(l.education) + '</h3>';
    p.education.forEach(edu => {
      html += '<div class="profile-card">';
      html += '<div class="card-title">' + escapeHtml(edu.institution) + '</div>';
      const degreeField = [edu.degree, edu.field_of_study].filter(Boolean).join(', ');
      if (degreeField) html += '<div class="card-subtitle">' + escapeHtml(degreeField) + '</div>';
      const dates = [edu.start_date, edu.end_date].filter(Boolean).join(' — ');
      if (dates) html += '<div class="card-date">' + escapeHtml(dates) + '</div>';
      if (edu.location) html += '<div class="card-date">' + escapeHtml(edu.location) + '</div>';
      if (edu.description) html += '<div class="card-desc">' + escapeHtml(edu.description) + '</div>';
      html += '</div>';
    });
    html += '</div>';
  }

  // Languages
  if (p.languages && p.languages.length) {
    html += '<div class="profile-section"><h3>' + escapeHtml(l.languages) + '</h3>';
    html += '<div class="profile-langs">';
    p.languages.forEach(lg => {
      html += '<div class="lang-item">' + escapeHtml(lg.name);
      if (lg.level) html += ' <span class="lang-level">(' + escapeHtml(lg.level) + ')</span>';
      html += '</div>';
    });
    html += '</div></div>';
  }

  // Certifications
  if (p.certifications && p.certifications.length) {
    html += '<div class="profile-section"><h3>' + escapeHtml(l.certifications) + '</h3>';
    html += '<ul class="profile-certs">';
    p.certifications.forEach(c => {
      html += '<li>' + escapeHtml(c) + '</li>';
    });
    html += '</ul></div>';
  }

  // Achievements
  if (p.achievements) {
    html += '<div class="profile-section"><h3>' + escapeHtml(l.achievements) + '</h3>';
    html += '<p>' + escapeHtml(p.achievements) + '</p></div>';
  }

  // Contact info
  const contacts = [];
  if (u.phone) contacts.push('<div>Phone: ' + escapeHtml(u.phone) + '</div>');
  if (u.telegram) contacts.push('<div>Telegram: ' + escapeHtml(u.telegram) + '</div>');
  if (u.email) contacts.push('<div>Email: ' + escapeHtml(u.email) + '</div>');
  if (contacts.length) {
    html += '<div class="profile-section"><h3>' + escapeHtml(l.contact) + '</h3>';
    html += '<div class="profile-contact">' + contacts.join('') + '</div></div>';
  }

  profileDiv.innerHTML = html;
}

// ==================== NAVIGATION ====================

tg.BackButton.onClick(function() {
  if (currentView === 'detail') {
    currentView = 'list';
    document.getElementById('detailView').className = 'detail-view';
    document.getElementById('listView').style.display = 'block';
    tg.BackButton.hide();
  }
});

// ==================== INIT ====================

if (viewParam === 'profile') {
  initProfileView();
} else {
  initVacancyView();
}
</script>
</body>
</html>
