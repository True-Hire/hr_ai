<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR AI | Premium API Debugger</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0088cc;
            --secondary: #38bdf8;
            --bg: #020617;
            --card: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            background-image:
                radial-gradient(at 0% 0%, rgba(0, 136, 204, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(56, 189, 248, 0.1) 0px, transparent 50%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .dashboard {
            width: 100%;
            max-width: 800px;
            background: var(--card);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 600;
            background: linear-gradient(to right, #fff, var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            opacity: 0.6;
            font-size: 0.9rem;
            margin-top: 8px;
        }

        .input-section {
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            color: var(--secondary);
            font-weight: 600;
        }

        .input-field {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
            margin-bottom: 15px;
            transition: all 0.3s;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(0, 136, 204, 0.2);
        }

        textarea.input-field {
            min-height: 120px;
            font-family: monospace;
            font-size: 0.8rem;
            line-height: 1.5;
        }

        .btn {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(0, 136, 204, 0.5);
        }

        .btn:active {
            transform: translateY(0);
        }

        .response-section {
            margin-top: 30px;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.05);
        }

        #response {
            background: #000;
            border-radius: 12px;
            padding: 20px;
            font-family: 'Fira Code', 'Cascadia Code', monospace;
            font-size: 0.85rem;
            color: #10b981;
            overflow-x: auto;
            border: 1px solid rgba(255, 255, 255, 0.05);
            min-height: 100px;
            white-space: pre-wrap;
        }

        .loader {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            display: none;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <div class="dashboard">
        <div class="header">
            <h1>HR AI API Tester</h1>
            <p>Telegram Mini App Authentication Debugger</p>
        </div>

        <div class="input-section">
            <label>API Endpoint</label>
            <input type="text" id="url" class="input-field" value="http://localhost:8080/api/v1/hr-miniapp/me">

            <label>Authorization Header (Token)</label>
            <textarea id="token" class="input-field"
                placeholder="tma query_id=...">tma query_id=AAGczWI0AwAAAJzNYjRoKaI9&user=%7B%22id%22%3A7321341340%2C%22first_name%22%3A%22Devit%22%2C%22last_name%22%3A%22%22%2C%22username%22%3A%22devit_uz%22%2C%22language_code%22%3A%22en%22%2C%22allows_write_to_pm%22%3Atrue%2C%22photo_url%22%3A%22https%3A%5C%2F%5C%2Ft.me%5C%2Fi%5C%2Fuserpic%5C%2F320%5C%2Fq0NRCPFuwV7nebsJyb28vEjm_cd3WHx-dTO4V9IaU-HI9IFt-K72S-LWB777tvqn.svg%22%7D&auth_date=1777530125&signature=BY4prq5yKXFeBrP9EWIUMh3vlZLW_5tQKC82LAtU3x2fJ7FfewB6_dFprazuD0h6KXXsjQIH1e1XoL6LB5gRDg&hash=2854ea636a69f39b5e61784f1bd5b46c25870f2c044bbca9dd8ba2982cceab15</textarea>
        </div>

        <button onclick="runTest()" class="btn" id="btn">
            <div class="loader" id="loader"></div>
            <span id="btn-text">So'rov yuborish</span>
        </button>

        <div class="response-section">
            <label>Serverdan kelgan javob</label>
            <div id="status" class="status-badge">Tayyor</div>
            <pre id="response">Waiting for request...</pre>
        </div>
    </div>

    <script>
        async function runTest() {
            const url = document.getElementById('url').value;
            const token = document.getElementById('token').value;
            const resBox = document.getElementById('response');
            const statusBox = document.getElementById('status');
            const loader = document.getElementById('loader');
            const btnText = document.getElementById('btn-text');

            // UI Reset
            resBox.style.color = "#10b981";
            resBox.innerText = "Yuborilmoqda...";
            loader.style.display = "block";
            btnText.innerText = "Kutilmoqda...";
            statusBox.innerText = "Processing...";

            try {
                const start = performance.now();
                const response = await fetch(url, {
                    method: 'GET',
                    headers: {
                        'Authorization': token,
                        'Accept': 'application/json'
                    }
                });
                const end = performance.now();
                const time = (end - start).toFixed(0);

                const data = await response.json();

                statusBox.innerText = `Status: ${response.status} | Time: ${time}ms`;
                statusBox.style.background = response.ok ? "rgba(16, 185, 129, 0.2)" : "rgba(239, 68, 68, 0.2)";
                statusBox.style.color = response.ok ? "#10b981" : "#ef4444";

                resBox.style.color = response.ok ? "#10b981" : "#fbbf24";
                resBox.innerText = JSON.stringify(data, null, 4);

            } catch (err) {
                statusBox.innerText = "Xatolik";
                statusBox.style.background = "rgba(239, 68, 68, 0.2)";
                resBox.style.color = "#ef4444";
                resBox.innerText = "Xato: " + err.message + "\n\nMaslahatlar:\n1. Backend ishlayotganini tekshiring.\n2. CORS ruxsatini (Middleware) tekshiring.\n3. URL manzilini tekshiring.";
            } finally {
                loader.style.display = "none";
                btnText.innerText = "Qayta sinash";
            }
        }
    </script>
</body>

</html>
